<vbox id="zotero-prefpane-reader-tool-shortcuts" class="main-section rts-settings">
  <html:p class="description">
    입력칸을 선택한 뒤 원하는 키 조합을 누르세요. 변경 사항은 즉시 적용됩니다.
  </html:p>

  <html:div class="shortcut-row">
    <html:label for="rts-note">노트 추가</html:label>
    <html:input id="rts-note" type="text" readonly="readonly" data-pref="noteShortcut" />
    <html:button type="button" data-clear="noteShortcut">해제</html:button>
    <html:button type="button" data-reset="noteShortcut">기본값</html:button>
  </html:div>

  <html:div class="shortcut-row">
    <html:label for="rts-text">텍스트 추가</html:label>
    <html:input id="rts-text" type="text" readonly="readonly" data-pref="textShortcut" />
    <html:button type="button" data-clear="textShortcut">해제</html:button>
    <html:button type="button" data-reset="textShortcut">기본값</html:button>
  </html:div>

  <html:div class="shortcut-row">
    <html:label for="rts-area">영역 선택</html:label>
    <html:input id="rts-area" type="text" readonly="readonly" data-pref="areaShortcut" />
    <html:button type="button" data-clear="areaShortcut">해제</html:button>
    <html:button type="button" data-reset="areaShortcut">기본값</html:button>
  </html:div>

  <html:div class="text-defaults">
    <html:h2>텍스트 상자 기본값</html:h2>
    <html:div class="text-default-row">
      <html:label for="rts-text-color">글자색</html:label>
      <html:input id="rts-text-color" type="color" />
      <html:label for="rts-text-size">글자 크기</html:label>
      <html:select id="rts-text-size">
        <html:option value="6">6</html:option>
        <html:option value="8">8</html:option>
        <html:option value="10">10</html:option>
        <html:option value="12">12</html:option>
        <html:option value="14">14</html:option>
        <html:option value="18">18</html:option>
        <html:option value="24">24</html:option>
        <html:option value="36">36</html:option>
        <html:option value="48">48</html:option>
        <html:option value="64">64</html:option>
        <html:option value="72">72</html:option>
        <html:option value="96">96</html:option>
        <html:option value="144">144</html:option>
        <html:option value="192">192</html:option>
      </html:select>
      <html:button id="rts-reset-text-defaults" type="button">기본값</html:button>
    </html:div>
  </html:div>

  <html:p id="rts-status" role="status" aria-live="polite"></html:p>
  <html:p class="hint">
    문자 입력 중에는 오작동하지 않도록 검색창, 노트 편집기, 페이지 번호 입력창에서는 단축키를 무시합니다.
  </html:p>
</vbox>
